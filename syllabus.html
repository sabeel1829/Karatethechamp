<!DOCTYPE html>

<title>Syllabus | Karate The Champ</title>

<style>
*{
    margin:5px;
    padding:2px;
    box-sizing:border-box;
    font-family:Inter, Arial, Helvetica, sans-serif;
}

body{
    background:#f5efe7;
    color:#111111;
    line-height:1.75;
}

nav{
    width:100%;
    padding:22px 8%;
    background:#ffffff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(34,34,34,0.08);
    box-shadow:0 20px 50px rgba(0,0,0,0.06);
}

.logo-container{
    display:flex;
    align-items:center;
    gap:0;
}

.logo-img{
    width:30px;
    height:30px;
    object-fit:contain;
}

.logo{
    font-size:20px;
    font-weight:800;
    color:#111111;
    letter-spacing:0.12em;
    text-transform:uppercase;
    white-space:nowrap;
    line-height:1;
}

nav ul{
    display:flex;
    list-style:none;
    gap:24px;
    align-items:center;
}

nav ul li a{
    color:#111111;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
    text-transform:uppercase;
    letter-spacing:0.1em;
}

nav ul li a:hover{
    color:#bb6b30;
}

.page-hero{
    padding:100px 8% 45px;
    background:#f2ebe2;
}

.page-hero h1{
    font-size:60px;
    margin-bottom:18px;
    color:#111111;
    letter-spacing:-0.05em;
}

.page-hero p{
    max-width:760px;
    color:#5d5850;
    font-size:19px;
    line-height:1.9;
}

main{
    padding:45px 8% 70px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    border:1px solid rgba(34,34,34,0.08);
    box-shadow:0 18px 45px rgba(0,0,0,0.06);
    transition:0.3s;
}

.gallery img:hover{
    transform:translateY(-6px);
    box-shadow:0 24px 65px rgba(0,0,0,0.09);
}

footer{
    text-align:center;
    padding:24px;
    background:#f2ebe2;
    color:#6b6560;
}

@media(max-width:900px){
    nav{
        flex-direction:column;
        gap:12px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
    }

    .page-hero h1{
        font-size:42px;
    }
}
</style>
